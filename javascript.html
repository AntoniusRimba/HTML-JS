<!DOCTYPE html>
<html>

<head>
    <title>Tugas JavaScript</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .header img {
            width: 100px;
        }
        
        .section {
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <div class="header">
        <img src="foto.jpg">
        <div>
            <h3>Nama : ANTONIUS RIMBA ADIPRIHARTANTO</h3>
            <h3>NIM : 245314036</h3>
        </div>
    </div>

    <hr>

    <div class="section">

        Nama :
        <input type="text" id="nama"><br><br> Jumlah Pilihan :
        <input type="number" id="jumlah" min="1"><br><br>

        <button onclick="step1()">OK</button>

    </div>

    <div id="pilihanInput"></div>
    <div id="radioArea"></div>
    <div id="emailArea"></div>
    <div id="output"></div>

    <script>
        let pilihanArray = [];
        let namaUser = "";
        let jumlahPilihan = 0;
        let pilihanDipilih = "";

        function step1() {

            namaUser = document.getElementById("nama").value;
            jumlahPilihan = parseInt(document.getElementById("jumlah").value);

            if (namaUser == "" || jumlahPilihan <= 0) {
                alert("Nama dan jumlah harus diisi");
                return;
            }

            let html = "";

            for (let i = 1; i <= jumlahPilihan; i++) {

                html += "Pilihan " + i + " : ";
                html += "<input type='text' id='p" + i + "'><br><br>";

            }

            html += "<button onclick='step2()'>OK</button>";

            document.getElementById("pilihanInput").innerHTML = html;

        }

        function step2() {

            pilihanArray = [];

            for (let i = 1; i <= jumlahPilihan; i++) {

                let teks = document.getElementById("p" + i).value;

                if (teks == "") {
                    alert("Semua pilihan harus diisi");
                    return;
                }

                pilihanArray.push(teks);

            }

            let html = "Pilihan : <br><br>";

            for (let i = 0; i < pilihanArray.length; i++) {

                html += "<input type='radio' name='radioPilihan' value='" + pilihanArray[i] + "'> ";
                html += pilihanArray[i] + "<br>";

            }

            html += "<br><button onclick='step3()'>OK</button>";

            document.getElementById("radioArea").innerHTML = html;

        }

        function step3() {

            let radio = document.getElementsByName("radioPilihan");

            for (let i = 0; i < radio.length; i++) {
                if (radio[i].checked) {
                    pilihanDipilih = radio[i].value;
                }
            }

            if (pilihanDipilih == "") {
                alert("Pilih salah satu pilihan");
                return;
            }

            let html = "Email : ";
            html += "<input type='text' id='email'>";
            html += "<br><br><button onclick='step4()'>OK</button>";

            document.getElementById("emailArea").innerHTML = html;

        }

        function step4() {

            let email = document.getElementById("email").value;

            let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if (!email.match(pattern)) {
                alert("Email tidak valid");
                return;
            }

            let semuaPilihan = pilihanArray.join(", ");

            let kalimat =
                "Hallo, nama saya " + namaUser +
                ", email " + email +
                " saya mempunyai sejumlah " + jumlahPilihan +
                " pilihan yaitu " + semuaPilihan +
                ", dan saya memilih " + pilihanDipilih;

            document.getElementById("output").innerHTML = "<h3>" + kalimat + "</h3>";

        }
    </script>

</body>

</html>
