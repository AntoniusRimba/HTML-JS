<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 4 - Modern Interface</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="shape circle"></div>
    <div class="shape rectangle"></div>
    <div class="shape star">★</div>

    <header class="card">
        <img src="foto.jpg" alt="Profile" width="100">
        <div class="header-text">
            <h3>Portal Mahasiswa</h3>
            <p>Antonius Rimba Adiprihartanto | 245314036</p>
        </div>
    </header>

    <main class="container">
        <section id="step1" class="section card">
            <h2>Mulai Pilihan Anda</h2>
            <div class="field">
                <label>Nama</label>
                <input type="text" id="inputNama" placeholder="Masukkan nama...">
            </div>
            <div class="field">
                <label>Jumlah Pilihan</label>
                <input type="number" id="inputJml" placeholder="Contoh: 3">
            </div>
            <button class="btn-primary" onclick="prosesTahap1()">Lanjutkan</button>
            <span id="err1" class="error"></span>
        </section>

        <section id="step2" class="section card hidden">
            <h2>Isi Detail Pilihan</h2>
            <div id="containerPilihan"></div>
            <div class="actions">
                <button class="btn-outline" onclick="tambahSatuInput()">+ Tambah</button>
                <button class="btn-primary" onclick="prosesTahap2()">OK</button>
            </div>
            <span id="err2" class="error"></span>
        </section>

        <section id="step3" class="section card hidden">
            <h2>Tentukan Pilihan</h2>
            <p class="sub-text">Pilih salah satu opsi di bawah ini:</p>
            <div id="containerSelection" class="radio-group"></div>
            <button class="btn-primary" onclick="prosesTahap3()">Konfirmasi</button>
            <span id="err3" class="error"></span>
        </section>

        <section id="step4" class="section card hidden">
            <h2>Validasi Kontak</h2>
            <div class="field email-group">
                <input type="text" id="inputEmail" placeholder="nama@email.com">
                <button class="btn-inline" onclick="prosesTahap4()">Langganan</button>
            </div>
            <span id="err4" class="error"></span>
        </section>

        <section id="step5" class="section card hidden final-message">
            <p id="teksHasil"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
